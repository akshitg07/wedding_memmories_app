services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wedding
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U wedding"], interval: 10s, timeout: 5s, retries: 5 }
  api:
    build: { context: ., dockerfile: docker/api.Dockerfile }
    environment:
      DATABASE_URL: postgresql://wedding:wedding@postgres:5432/wedding
      JWT_SECRET: change-me-with-32-characters-minimum
      REFRESH_SECRET: change-me-too-with-32-characters-min
      CORS_ORIGIN: http://localhost
      STORAGE_DIR: /mnt/wedding-memories
      MEDIA_LIBRARY_DIR: /mnt/wedding-memories/library
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    volumes:
      - /mnt:/mnt
    depends_on: { postgres: { condition: service_healthy } }
    healthcheck: { test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1))"], interval: 30s, timeout: 5s, retries: 3 }
  web:
    build: { context: ., dockerfile: docker/web.Dockerfile }
    environment: { NEXT_PUBLIC_API_URL: http://localhost/api }
    depends_on: [api]
  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes: [./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: [web, api]
volumes: { postgres_data: {} }
